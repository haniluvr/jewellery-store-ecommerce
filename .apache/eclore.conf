<VirtualHost *:80>
    ServerName eclorejewellery.shop
    ServerAlias www.eclorejewellery.shop
    DocumentRoot /var/www/html/eclore-jewellery/public

    <Directory /var/www/html/eclore-jewellery/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/eclore_error.log
    CustomLog ${APACHE_LOG_DIR}/eclore_access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName admin.eclorejewellery.shop
    DocumentRoot /var/www/html/eclore-jewellery/public

    <Directory /var/www/html/eclore-jewellery/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/eclore_admin_error.log
    CustomLog ${APACHE_LOG_DIR}/eclore_admin_access.log combined
</VirtualHost>
